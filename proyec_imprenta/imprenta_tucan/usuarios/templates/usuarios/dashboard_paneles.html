{% extends 'usuarios/dashboard.html' %}
{% block extra_panels %}
{% if puede_configurar_ofertas %}
<h3 class="mt-8 mb-2 text-sm font-semibold text-gray-600">Gestión de Ofertas</h3>
<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Reglas de Ofertas -->
    <a href="{% url 'editar_reglas_ofertas' %}" class="group bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition block">
        <div class="flex items-center gap-3 mb-3">
            <div class="h-12 w-12 rounded-full bg-indigo-50 text-indigo-700 grid place-items-center">
                <span class="material-symbols-outlined">tune</span>
            </div>
            <div>
                <p class="text-sm text-gray-500">Ofertas</p>
                <p class="text-lg font-bold">Reglas de ofertas</p>
                <p class="text-xs text-gray-400 group-hover:text-gray-600">Editar condiciones y acciones</p>
            </div>
        </div>
    </a>
</section>
{% endif %}
{% endblock %}

{% block scripts %}{% endblock %}
