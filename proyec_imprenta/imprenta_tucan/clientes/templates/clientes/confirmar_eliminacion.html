{% extends 'base.html' %}
{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">
  <h2 class="text-2xl font-bold text-orange-600 mb-6">⚠️ Confirmar Desactivación</h2>
  <p class="text-gray-800 mb-4">¿Estás seguro que querés desactivar al cliente <strong>{{ cliente.nombre }} {{ cliente.apellido }}</strong>?</p>
  <form method="post" class="flex justify-end gap-4">
    {% csrf_token %}
    <a href="{% url 'buscar_cliente' %}" class="px-6 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400">Cancelar</a>
    <button type="submit" class="px-6 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">Desactivar</button>
  </form>
</div>
{% endblock %}
