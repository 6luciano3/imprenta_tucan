<script>
// Modal y AJAX para edición rápida de fórmula
let recetaId = null;
let currentProductoId = null;
function openFormulaModal(id, currentFormula) {
    recetaId = id;
    // Selecciona la fórmula actual en el combo
    const select = document.getElementById('formula-select');
    if (select) {
        // Si currentFormula está vacío, selecciona la primera opción
        if (currentFormula) {
            select.value = currentFormula;
        } else {
            select.selectedIndex = 0;
        }
    }
    document.getElementById('formula-modal').classList.remove('hidden');
}
function closeFormulaModal() {
    recetaId = null;
    document.getElementById('formula-modal').classList.add('hidden');
}
function attachFormulaListeners() {
    document.querySelectorAll('.btn-edit-formula').forEach(btn => {
        // Evita listeners duplicados
        btn.removeEventListener('click', btn._editFormulaHandler || (()=>{}));
        btn._editFormulaHandler = function() {
            openFormulaModal(this.dataset.id, this.dataset.formula);
        };
        btn.addEventListener('click', btn._editFormulaHandler);
    });
    var saveBtn = document.getElementById('formula-save-btn');
    if (saveBtn && !saveBtn._formulaSaveHandler) {
        saveBtn._formulaSaveHandler = function() {
            const formulaId = document.getElementById('formula-select').value;
            if (!recetaId || !formulaId) return;
            fetch(`/configuracion/recetas/${recetaId}/editar_formula/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `formula_id=${formulaId}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById(`formula-label-${recetaId}`).innerText = data.formula;
                    closeFormulaModal();
                } else {
                    alert(data.error || 'Error al actualizar fórmula');
                }
            });
        };
        saveBtn.addEventListener('click', saveBtn._formulaSaveHandler);
    }
    var cancelBtn = document.getElementById('formula-cancel-btn');
    if (cancelBtn && !cancelBtn._formulaCancelHandler) {
        cancelBtn._formulaCancelHandler = closeFormulaModal;
        cancelBtn.addEventListener('click', cancelBtn._formulaCancelHandler);
    }
}

// Intenta adjuntar listeners al cargar y cada vez que se muestra el modal
document.addEventListener('DOMContentLoaded', function() {
    attachFormulaListeners();
    // Si el modal se vuelve visible, re-adjunta listeners por si el DOM cambió
    const modal = document.getElementById('formula-modal');
    if (modal) {
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(m) {
                if (modal.classList.contains('hidden') === false) {
                    setTimeout(attachFormulaListeners, 50);
                }
            });
        });
        observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
    }
});
</script>
